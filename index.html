<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>%VITE_SITE_TITLE%</title>
    <meta name="description" content="%VITE_META_DESCRIPTION%" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph / Facebook, WhatsApp, LinkedIn, Slack, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_BRAND_NAME%" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta property="og:description" content="%VITE_META_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_SITE_URL%/hero-banner.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1122" />
    <meta property="og:image:height" content="1402" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_META_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SITE_URL%/hero-banner.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
